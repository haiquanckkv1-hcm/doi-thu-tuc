<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANH BẠ TỔ NGHIỆP VỤ ĐĂNG KÝ</title>
    <style>
        /* CSS CHUNG */
        body { font-family: Arial, sans-serif; background-color: #f0f4f9; margin: 0; padding: 20px; color: #333; }
        .main-container { width: 100%; max-width: 1200px; margin: auto; box-sizing: border-box; }
        header { background-color: #0d47a1; color: white; padding: 20px 40px; border-radius: 20px; margin-bottom: 20px; text-align: center; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .logo { height: 90px; }
        .unit-info h3 { margin: 0; font-size: 16px; font-weight: normal; text-align: left;}
        .unit-info p { margin: 0; font-size: 14px; opacity: 0.8; text-align: left;}
        .title-area h1 { color: #fbc02d; margin: 0 0 10px 0; font-size: 28px; }
        .search-bar { background-color: white; color: #666; padding: 10px 20px; border-radius: 30px; display: flex; align-items: center; margin-bottom: 20px; }
        .search-bar input { border: none; outline: none; flex-grow: 1; font-size: 16px; }

        .tab-buttons { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .tab-btn { background-color: #e3f2fd; color: #0d47a1; border: 2px solid #0d47a1; padding: 12px 30px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .tab-btn.active { background-color: #0d47a1; color: white; }
        .tab-content { display: none; animation: fadeEffect 0.5s; }
        @keyframes fadeEffect { from {opacity: 0;} to {opacity: 1;} }

        /* GIAO DIỆN HEADER TỔ (Theo mẫu bo góc đen mới) */
        .group-table-section { margin-bottom: 40px; }
        
        .custom-group-header {
            background-color: white;
            border: 3px solid #1a1a1a;
            border-radius: 35px;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            position: relative;
        }
        
        .custom-group-number {
            font-size: 40px;
            border: 4px solid #1a1a1a;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 25px;
            color: #1a1a1a;
            flex-shrink: 0;
        }

        .custom-group-details {
            display: flex;
            flex-direction: column;
            color: #1a1a1a;
            font-family: Arial, sans-serif;
        }
        
        .custom-group-name { font-size: 18px; margin-bottom: 6px; }
        .custom-group-hs { font-size: 16px; margin-bottom: 6px; }
        .custom-group-commodity { font-size: 15px; }

        .custom-cbcc-count {
            position: absolute;
            right: 40px;
            text-align: center;
            color: #1a1a1a;
        }
        
        .custom-cbcc-count .number { font-size: 26px; font-weight: bold; }
        .custom-cbcc-count .label { font-size: 11px; text-transform: uppercase; font-weight: bold;}

        /* BẢNG DANH SÁCH (Tách rời khỏi header) */
        .staff-table-container {
            background-color: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-top: 15px;
        }
        
        .staff-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .staff-table th { background-color: #f8f9fa; color: #0d47a1; text-align: left; padding: 15px 25px; border-bottom: 2px solid #e0e0e0; }
        .staff-table td { padding: 15px 25px; color: #333; font-weight: bold; border-bottom: 1px solid #e0e0e0; }
        .staff-table tr.leader-row td { background-color: #fbfbfb; }
        
        .badge { display: inline-flex; align-items: center; padding: 5px 10px; border-radius: 15px; font-size: 12px; font-weight: bold; }
        .badge-nhom-truong { background-color: #fff9c4; color: #f57f17; border: 1px solid #fdd835; }
        .badge-nhom-truong::before { content: '⭐ '; }
        .badge-tiep-nhan { background-color: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }
        .badge-cntt { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        
        #loading { text-align: center; font-size: 18px; color: #0d47a1; padding: 50px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="main-container">
        <header>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Nhập Họ và Tên để tìm kiếm...">
            </div>
            <div class="logo-area">
                <img src="logo-hq.png" alt="Logo" class="logo">
                <div class="unit-info">
                    <h3>CHI CỤC HẢI QUAN KHU VỰC II</h3>
                    <p>HẢI QUAN CỬA KHẨU CẢNG SÀI GÒN KV1</p>
                </div>
            </div>
            <div class="title-area">
                <h1>DANH SÁCH CÁC TỔ NGHIỆP VỤ ĐĂNG KÝ</h1>
            </div>
        </header>

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="openTab(event, 'nhap-khau')">Bộ phận thủ tục hàng hóa nhập khẩu</button>
            <button class="tab-btn" onclick="openTab(event, 'xuat-khau')">Bộ phận thủ tục hàng hóa xuất khẩu</button>
        </div>

        <div id="loading">⏳ Đang tải dữ liệu danh bạ từ máy chủ...</div>
        <div id="nhap-khau" class="tab-content" style="display: none;"></div>
        <div id="xuat-khau" class="tab-content" style="display: none;"></div>
    </div>

    <script>
        // DÁN ĐƯỜNG LINK APP SCRIPT CỦA ANH VÀO DẤU NGOẶC KÉP BÊN DƯỚI
        const API_URL = "https://script.google.com/macros/s/AKfycbxYJnWTTzYeAtUagn0ksXfSn9fmD-Js1_tzzIaJjfPJGIjQkCmV7g9Km8DWxIFG4w7e3Q/exec";

        function openTab(evt, tabId) {
            var tabcontent = document.getElementsByClassName("tab-content");
            for (var i = 0; i < tabcontent.length; i++) tabcontent[i].style.display = "none";
            var tablinks = document.getElementsByClassName("tab-btn");
            for (var i = 0; i < tablinks.length; i++) tablinks[i].className = tablinks[i].className.replace(" active", "");
            document.getElementById(tabId).style.display = "block";
            evt.currentTarget.className += " active";
        }

        function renderData(dataArray, containerId) {
            let container = document.getElementById(containerId);
            let html = "";

            dataArray.forEach(group => {
                let tongCBCC = group.nhanVien.length;
                
                // Trích xuất tự động con số từ chữ "tổ nghiệp vụ 1" để làm khung tròn
                let match = group.tenTo.match(/\d+/);
                let soTo = match ? match[0].padStart(2, '0') : "00";

                // HTML cho Header mới (viền bo đen, 3 dòng text)
                html += `<div class="group-table-section">
                    <div class="custom-group-header">
                        <div class="custom-group-number">${soTo}</div>
                        <div class="custom-group-details">
                            <div class="custom-group-name">${group.tenTo}</div>
                            <div class="custom-group-hs">${group.chuongHs}</div>
                            <div class="custom-group-commodity">${group.moTa}</div>
                        </div>
                        <div class="custom-cbcc-count">
                            <span class="number">${tongCBCC}</span><br>
                            <span class="label">CBCC</span>
                        </div>
                    </div>
                    
                    <div class="staff-table-container">
                        <table class="staff-table">
                            <thead>
                                <tr><th>STT</th><th>HỌ VÀ TÊN</th><th>MÃ BÀN</th><th>VAI TRÒ</th><th>ĐIỆN THOẠI</th></tr>
                            </thead>
                            <tbody>`;
                
                group.nhanVien.forEach(nv => {
                    let badgeClass = 'badge-tiep-nhan';
                    let isLeader = nv.vaiTro.toLowerCase().includes('trưởng');
                    if (isLeader) badgeClass = 'badge-nhom-truong';
                    else if (nv.vaiTro.toLowerCase().includes('cntt')) badgeClass = 'badge-cntt';

                    html += `<tr class="${isLeader ? 'leader-row' : ''}">
                        <td>${nv.stt}</td>
                        <td><span style="color: #0d47a1;">${nv.hoTen}</span></td>
                        <td style="color:#666; font-weight:normal">${nv.maBan}</td>
                        <td><span class="badge ${badgeClass}">${nv.vaiTro}</span></td>
                        <td><span style="color: #0d47a1;">${nv.dienThoai}</span></td>
                    </tr>`;
                });
                html += `</tbody></table></div></div>`;
            });
            container.innerHTML = html;
        }

        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                renderData(data.nhapKhau, 'nhap-khau');
                renderData(data.xuatKhau, 'xuat-khau');
                document.getElementById('nhap-khau').style.display = 'block'; 
            })
            .catch(err => {
                document.getElementById('loading').innerHTML = "❌ Không thể tải dữ liệu. Vui lòng kiểm tra lại link kết nối.";
            });
    </script>
</body>
</html>
