<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANH BẠ TỔ NGHIỆP VỤ ĐĂNG KÝ</title>
    <style>
        /* CSS CHUNG */
        body { font-family: Arial, sans-serif; background-color: #f0f4f9; margin: 0; padding: 20px; color: #333; }
        .main-container { width: 100%; max-width: 1200px; margin: auto; box-sizing: border-box; }
        header { background-color: #1976d2; color: white; padding: 20px 40px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .logo-area { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .logo { height: 90px; }
        .unit-info h3 { margin: 0; font-size: 16px; font-weight: normal; text-align: left;}
        .unit-info p { margin: 0; font-size: 14px; opacity: 0.8; text-align: left;}
        .title-area h1 { color: #fbc02d; margin: 0 0 10px 0; font-size: 28px; }
        .search-bar { background-color: white; color: #666; padding: 10px 20px; border-radius: 30px; display: flex; align-items: center; margin-bottom: 20px; }
        .search-bar input { border: none; outline: none; flex-grow: 1; font-size: 16px; }

        .tab-buttons { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .tab-btn { background-color: #e3f2fd; color: #1976d2; border: 2px solid #1976d2; padding: 12px 30px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .tab-btn.active { background-color: #1976d2; color: white; }
        .tab-content { display: none; animation: fadeEffect 0.5s; }
        @keyframes fadeEffect { from {opacity: 0;} to {opacity: 1;} }

        /* GIAO DIỆN HEADER TỔ ĐA SẮC */
        .group-table-section { 
            background-color: white; 
            border-radius: 15px; 
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            margin-bottom: 40px; 
        }
        
        .theme-group-header {
            color: white;
            padding: 20px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .group-header-left {
            display: flex;
            align-items: center;
        }

        .theme-group-number {
            font-size: 38px;
            font-weight: bold;
            background-color: rgba(255, 255, 255, 0.15); 
            border: 3px solid rgba(255, 255, 255, 0.6); 
            border-radius: 50%;
            width: 85px;
            height: 85px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 25px;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .theme-group-details {
            display: flex;
            flex-direction: column;
        }
        
        .theme-group-name { 
            font-size: 13px; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            margin-bottom: 4px;
            opacity: 0.9;
        }
        .theme-group-hs { 
            font-size: 22px; 
            font-weight: bold; 
            margin-bottom: 6px; 
        }
        .theme-group-commodity { 
            font-size: 14px; 
            font-weight: 500;
        }

        .theme-cbcc-count {
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
            padding: 10px 18px;
            text-align: center;
            min-width: 50px;
        }
        
        .theme-cbcc-count .number { font-size: 26px; font-weight: bold; display: block; line-height: 1; margin-bottom: 4px;}
        .theme-cbcc-count .label { font-size: 12px; font-weight: bold; opacity: 0.9;}

        /* BẢNG DANH SÁCH */
        .staff-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        
        /* Cột tiêu đề chuyển sang xám nhạt trung tính để hợp với mọi màu nền */
        .staff-table th { 
            background-color: #f4f6f8; 
            color: #444; 
            text-align: left; 
            padding: 15px 25px; 
            border-bottom: 2px solid #cfd8dc; 
        }
        
        .staff-table td { padding: 15px 25px; border-bottom: 1px solid #eeeeee; }
        .staff-table tr:last-child td { border-bottom: none; }
        .staff-table tr.leader-row td { background-color: #fafafa; }
        
        .col-text-blue { color: #1976d2; font-weight: bold; }
        .col-text-gray { color: #666; }

        .badge { display: inline-flex; align-items: center; padding: 6px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; }
        .badge-nhom-truong { background-color: #fff9c4; color: #f57f17; border: 1px solid #fdd835; }
        .badge-tiep-nhan { background-color: #f5f5f5; color: #555; border: 1px solid #e0e0e0; }
        .badge-cntt { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        
        #loading { text-align: center; font-size: 18px; color: #1976d2; padding: 50px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="main-container">
        <header>
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Nhập Họ và Tên để tìm kiếm...">
            </div>
            <div class="logo-area">
                <img src="logo-hq.png" alt="Logo" class="logo">
                <div class="unit-info">
                    <h3>CHI CỤC HẢI QUAN KHU VỰC II</h3>
                    <p>HẢI QUAN CỬA KHẨU CẢNG SÀI GÒN KV1</p>
                </div>
            </div>
            <div class="title-area">
                <h1>DANH SÁCH CÁC TỔ NGHIỆP VỤ ĐĂNG KÝ</h1>
            </div>
        </header>

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="openTab(event, 'nhap-khau')">Bộ phận thủ tục hàng hóa nhập khẩu</button>
            <button class="tab-btn" onclick="openTab(event, 'xuat-khau')">Bộ phận thủ tục hàng hóa xuất khẩu</button>
        </div>

        <div id="loading">⏳ Đang tải dữ liệu danh bạ từ máy chủ...</div>
        <div id="nhap-khau" class="tab-content" style="display: none;"></div>
        <div id="xuat-khau" class="tab-content" style="display: none;"></div>
    </div>

    <script>
        // BƯỚC QUAN TRỌNG: DÁN ĐƯỜNG LINK APP SCRIPT VÀO DẤU NGOẶC KÉP DƯỚI ĐÂY
        const API_URL = "https://script.google.com/macros/s/AKfycbxSV-w2EULnMKZ7KbYdubBBoQRDuJm5ck5scmdrJTJipMx45pLnZHJNw_l0qMuyMl6Rxg/exec";
        
        // Bảng màu cho các tổ (Xanh dương, Xanh lá, Cam, Tím, Xanh ngọc)
        const THEME_COLORS = ['#1976d2', '#2e7d32', '#ef6c00', '#6a1b9a', '#00838f'];

        function openTab(evt, tabId) {
            var tabcontent = document.getElementsByClassName("tab-content");
            for (var i = 0; i < tabcontent.length; i++) tabcontent[i].style.display = "none";
            var tablinks = document.getElementsByClassName("tab-btn");
            for (var i = 0; i < tablinks.length; i++) tablinks[i].className = tablinks[i].className.replace(" active", "");
            document.getElementById(tabId).style.display = "block";
            evt.currentTarget.className += " active";
        }

        function renderData(dataArray, containerId) {
            let container = document.getElementById(containerId);
            let html = "";

            dataArray.forEach((group, index) => {
                let tongCBCC = group.nhanVien.length;
                
                // Tự động gán màu lần lượt theo thứ tự Tổ
                let bgColor = THEME_COLORS[index % THEME_COLORS.length];
                
                // Trích xuất số
                let match = group.tenTo.match(/\d+/);
                let soTo = match ? match[0].padStart(2, '0') : "00";

                html += `<div class="group-table-section">
                    <div class="theme-group-header" style="background-color: ${bgColor};">
                        <div class="group-header-left">
                            <div class="theme-group-number">${soTo}</div>
                            <div class="theme-group-details">
                                <div class="theme-group-name">NHÓM ${soTo}</div>
                                <div class="theme-group-hs">${group.chuongHs}</div>
                                <div class="theme-group-commodity">${group.moTa}</div>
                            </div>
                        </div>
                        <div class="theme-cbcc-count">
                            <span class="number">${tongCBCC}</span>
                            <span class="label">CBCC</span>
                        </div>
                    </div>
                    
                    <table class="staff-table">
                        <thead>
                            <tr>
                                <th>STT</th>
                                <th>HỌ VÀ TÊN</th>
                                <th>MÃ BÀN</th>
                                <th>VAI TRÒ</th>
                                <th>ĐIỆN THOẠI</th>
                            </tr>
                        </thead>
                        <tbody>`;
                
                group.nhanVien.forEach(nv => {
                    let badgeClass = 'badge-tiep-nhan';
                    let isLeader = nv.vaiTro.toLowerCase().includes('trưởng');
                    if (isLeader) badgeClass = 'badge-nhom-truong';
                    else if (nv.vaiTro.toLowerCase().includes('cntt')) badgeClass = 'badge-cntt';

                    html += `<tr class="${isLeader ? 'leader-row' : ''}">
                        <td class="col-text-blue">${nv.stt}</td>
                        <td class="col-text-blue">${nv.hoTen}</td>
                        <td class="col-text-gray">${nv.maBan}</td>
                        <td><span class="badge ${badgeClass}">${nv.vaiTro}</span></td>
                        <td class="col-text-blue">${nv.dienThoai}</td>
                    </tr>`;
                });
                html += `</tbody></table></div>`;
            });
            container.innerHTML = html;
        }

        fetch(API_URL)
            .then(res => res.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                renderData(data.nhapKhau, 'nhap-khau');
                renderData(data.xuatKhau, 'xuat-khau');
                document.getElementById('nhap-khau').style.display = 'block'; 
            })
            .catch(err => {
                document.getElementById('loading').innerHTML = "❌ Không thể tải dữ liệu. Vui lòng kiểm tra lại link kết nối.";
            });
    </script>
</body>
</html>
