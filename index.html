<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu Đội Thủ Tục</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f7f6;
            padding-top: 50px;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: auto;
        }
        h1 {
            color: #003366;
            font-size: 24px;
        }
        h2 {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }
        input[type="text"] {
            width: 70%;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #003d82;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CHI CỤC HẢI QUAN KHU VỰC II</h1>
        <h2>Cổng Tra Cứu Thông Tin - Đội Thủ Tục</h2>
        
        <div>
            <input type="text" placeholder="Nhập số tờ khai hoặc mã số thuế...">
            <br>
            <button type="button">Tra cứu</button>
        </div>
    </div>
</body>
</html>
