<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANH BẠ CÁC TỔ NGHIỆP VỤ</title>
    <style>
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%); background-attachment: fixed; margin: 0; padding: 10px; color: #333; display: flex; flex-direction: column; min-height: 100vh; }
        .main-container { width: 100%; max-width: 1200px; margin: auto; box-sizing: border-box; flex: 1; }
        header { background: rgba(25, 118, 210, 0.85); backdrop-filter: blur(12px); color: white; padding: 20px 10px; border-radius: 16px; margin-bottom: 20px; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
        .logo-area { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 15px; }
        .logo-box { flex: 0 0 55px; }
        .unit-info { flex: 1; text-align: center; }
        .logo-left, .logo-right { width: 100%; max-width: 65px; }
        .search-bar { background: rgba(255, 255, 255, 0.9); padding: 12px 15px; border-radius: 12px; margin-bottom: 10px; }
        .search-bar input { border: none; outline: none; width: 100%; background: transparent; }
        .tab-buttons { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { background: rgba(255, 255, 255, 0.5); border: none; padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: #1976d2; color: white; }
        .tab-content { display: none; }
        .group-table-section { background: rgba(255, 255, 255, 0.8); border-radius: 16px; margin-bottom: 20px; overflow: hidden; }
        .theme-group-header { color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .staff-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .staff-table th, .staff-table td { padding: 10px; border-bottom: 1px solid #ddd; text-align: center; }
        .badge { padding: 4px 8px; border-radius: 8px; font-weight: bold; font-size: 11px; }
        .badge-nhom-truong { background: #fff9c4; color: #e65100; }
        #loading { text-align: center; padding: 30px; font-weight: bold; color: #1976d2; }
        .footer-logo { height: 40px; }
    </style>
</head>
<body>
    <div class="main-container">
        <header>
            <div class="logo-area">
                <div class="logo-box"><img src="logo-hq.png" class="logo-left"></div>
                <div class="unit-info"><h3>CHI CỤC HẢI QUAN KHU VỰC II</h3><p>HẢI QUAN CỬA KHẨU CẢNG SÀI GÒN KV1</p></div>
                <div class="logo-box"><img src="logo-hqkv2.png" class="logo-right"></div>
            </div>
            <div class="search-bar"><input type="text" id="search-input" placeholder="Nhập từ khóa tìm kiếm..."></div>
        </header>
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="openTab(event, 'nhap-khau')">Nhập khẩu</button>
            <button class="tab-btn" onclick="openTab(event, 'xuat-khau')">Xuất khẩu</button>
        </div>
        <div id="loading">⏳ Đang tải dữ liệu...</div>
        <div id="nhap-khau" class="tab-content" style="display: block;"></div>
        <div id="xuat-khau" class="tab-content"></div>
    </div>

    <footer>
        <div style="text-align: center; padding: 15px;">
            <p style="font-size: 10px;">Lượt truy cập:</p>
            <img src="https://www.hitwebcounter.com/counter/counter.php?page=21508735&style=0024&nbdigits=5&type=page" height="25">
        </div>
    </footer>

    <script>
        let globalData = { nhapKhau: [], xuatKhau: [] };
        const THEME_COLORS = ['#1976d2', '#2e7d32', '#ef6c00', '#6a1b9a', '#00838f'];

        fetch('data.json')
            .then(res => res.json())
            .then(data => {
                globalData = data;
                document.getElementById('loading').style.display = 'none';
                renderData(data.nhapKhau, 'nhap-khau');
                renderData(data.xuatKhau, 'xuat-khau');
            })
            .catch(err => {
                document.getElementById('loading').innerHTML = "❌ Lỗi: " + err;
            });

        function renderData(dataArray, containerId) {
            let container = document.getElementById(containerId);
            let html = "";
            dataArray.forEach((group, index) => {
                let bgColor = THEME_COLORS[index % THEME_COLORS.length];
                html += `<div class="group-table-section"><div class="theme-group-header" style="background-color: ${bgColor};"><strong>${group.tenTo}</strong></div><table class="staff-table"><thead><tr><th>STT</th><th>Họ tên</th><th>Mã bàn</th><th>Vai trò</th></tr></thead><tbody>`;
                group.nhanVien.forEach(nv => {
                    let isLeader = nv.vaiTro.toLowerCase().includes('trưởng');
                    let displayRole = isLeader ? `<span style="white-space:nowrap;">⭐ ${nv.vaiTro}</span>` : nv.vaiTro;
                    html += `<tr><td>${nv.stt}</td><td>${nv.hoTen}<br><small>📞 ${nv.dienThoai}</small></td><td>${nv.maBan}</td><td><span class="badge ${isLeader?'badge-nhom-truong':''}">${displayRole}</span></td></tr>`;
                });
                html += `</tbody></table></div>`;
            });
            container.innerHTML = html;
        }

        function openTab(evt, tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            evt.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
